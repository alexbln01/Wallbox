* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
}

.app {
  max-width: 390px;
  margin: 0 auto;
  padding: 0 20px 50px;
}

/* HEADER */
header {
  padding: 56px 0 32px;
  opacity: 0;
  animation: fadeUp 0.5s 0.1s forwards;
}

.header-tag {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.25em;
  color: var(--yellow);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  letter-spacing: 0.04em;
  color: #fff;
  line-height: 1;
}

.header-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
}

/* LABEL */
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
  opacity: 0;
  animation: fadeUp 0.5s 0.25s forwards;
}

/* STATIONS */
.stations-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 14px;
}

.station-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 8px 20px;
  cursor: pointer;
  text-align: center;
  transition: transform 0.12s, border-color 0.2s, background 0.2s;
  opacity: 0;
  animation: fadeUp 0.4s forwards;
}

.station-btn:nth-child(1) { animation-delay: 0.3s; }
.station-btn:nth-child(2) { animation-delay: 0.35s; }
.station-btn:nth-child(3) { animation-delay: 0.4s; }
.station-btn:nth-child(4) { animation-delay: 0.45s; }
.station-btn:nth-child(5) { animation-delay: 0.5s; }
.station-btn:nth-child(6) { animation-delay: 0.55s; }

.station-btn:active { transform: scale(0.91); }

.station-btn.copied {
  border-color: var(--yellow);
  background: rgba(245,196,0,0.07);
}

.station-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 46px;
  line-height: 1;
  color: var(--text);
  display: block;
  transition: color 0.2s;
}

.station-btn.copied .station-num {
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(245,196,0,0.4);
}

.station-tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  display: block;
  margin-top: 4px;
}

/* SELECTED BAR */
.selected-bar {
  background: var(--card);
  border: 1px solid rgba(245,196,0,0.3);
  border-radius: 14px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}

.selected-bar.visible {
  opacity: 1;
  transform: translateY(0);
}

.selected-left { display: flex; align-items: center; gap: 12px; }

.selected-icon {
  width: 38px;
  height: 38px;
  background: var(--yellow);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: #000;
  flex-shrink: 0;
}

.selected-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.selected-hint {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

.copied-pill {
  background: var(--yellow);
  color: #000;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  padding: 5px 10px;
  border-radius: 100px;
  text-transform: uppercase;
}

/* REEV BUTTON */
.reev-btn {
  width: 100%;
  background: var(--yellow);
  border: none;
  border-radius: 18px;
  color: #000;
  font-family: 'Outfit', sans-serif;
  font-size: 18px;
  font-weight: 700;
  padding: 22px;
  cursor: pointer;
  transition: transform 0.12s, filter 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: 0;
  animation: fadeUp 0.5s 0.65s forwards;
  box-shadow: 0 0 30px rgba(245,196,0,0.15);
}

.reev-btn:active { transform: scale(0.97); filter: brightness(0.9); }
.reev-btn svg { width: 22px; height: 22px; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--yellow);
  color: #000;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 13px 26px;
  border-radius: 100px;
  z-index: 100;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 8px 30px rgba(245,196,0,0.3);
}

.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

<body>
<div class="app">

  <header>
    <div class="header-tag">Langen CNC · Wallbox</div>
    <div class="header-title">Ladestation</div>
    <div class="header-sub">Station antippen → Code kopiert → Reev starten</div>
  </header>

  <div class="section-label">Station wählen</div>
  <div class="stations-grid" id="stationsGrid"></div>

  <div class="selected-bar" id="selectedBar">
    <div class="selected-left">
      <div class="selected-icon" id="selectedIcon">–</div>
      <div>
        <div class="selected-name" id="selectedName">–</div>
        <div class="selected-hint">Code in Zwischenablage</div>
      </div>
    </div>
    <div class="copied-pill">Kopiert</div>
  </div>

  <button class="reev-btn" onclick="openReev()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    Reev starten
  </button>

</div>

<div class="toast" id="toast"></div>

<script>
const STATIONS = [
  { num: 1, code: "E6583" },
  { num: 2, code: "E5SQZ" },
  { num: 3, code: "EK2TL" },
  { num: 4, code: "EU7UW" },
  { num: 5, code: "E2UR9" },
  { num: 6, code: "EQZ6Y" },
];

let lastStation = null;
let lastBtn = null;

function buildStations() {
  const grid = document.getElementById("stationsGrid");
  STATIONS.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "station-btn";
    btn.innerHTML = `
      <span class="station-num">${s.num}</span>
      <span class="station-tag">Station</span>
    `;
    btn.onclick = () => copyCode(s, btn);
    grid.appendChild(btn);
  });
}

function copyCode(station, btn) {
  lastStation = station;

  navigator.clipboard.writeText(station.code).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = station.code;
    ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  });

  if (lastBtn) lastBtn.classList.remove("copied");
  btn.classList.add("copied");
  lastBtn = btn;

  document.getElementById("selectedIcon").textContent = station.num;
  document.getElementById("selectedName").textContent = `Station ${station.num} · ${station.code}`;
  document.getElementById("selectedBar").classList.add("visible");

  const t = document.getElementById("toast");
  t.textContent = `⚡ Station ${station.num} kopiert`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function openReev() {
  window.location.href = "shortcuts://run-shortcut?name=Reev";
}

buildStations();
</script>

</body>
</html>
