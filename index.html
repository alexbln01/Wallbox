* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

header {
  padding: 52px 0 32px;
}

.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
}

.header-main {
  font-size: 32px;
  font-weight: 600;
  line-height: 1.1;
  margin-top: 4px;
}

.header-sub {
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-left: 2px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  margin-bottom: 20px;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.stations-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.station-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.station-btn:active { transform: scale(0.94); }

.station-btn.copied {
  border-color: var(--green);
  background: rgba(0,255,136,0.08);
}

.station-num {
  font-family: 'Space Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  display: block;
  line-height: 1;
  margin-bottom: 6px;
}

.station-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: block;
}

.station-code {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: var(--accent2);
  margin-top: 4px;
  display: block;
  opacity: 0.8;
}

.selected-info {
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.25s;
}

.selected-info.visible {
  opacity: 1;
  transform: translateY(0);
}

.selected-text {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--green);
}

.selected-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.copied-badge {
  background: var(--green);
  color: #000;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 4px 8px;
  border-radius: 100px;
}

.reev-btn {
  width: 100%;
  background: linear-gradient(135deg, #00b4d8, #0077b6);
  border: none;
  border-radius: 14px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 17px;
  font-weight: 600;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.reev-btn:active { transform: scale(0.97); opacity: 0.85; }
.reev-btn svg { width: 22px; height: 22px; }

.copy-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: #000;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 12px 24px;
  border-radius: 100px;
  z-index: 1000;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  pointer-events: none;
}

.copy-toast.show {
  transform: translateX(-50%) translateY(0);
}

<script>
const STATIONS = [
  { num: 1, code: "E6583" },
  { num: 2, code: "E5SQZ" },
  { num: 3, code: "EK2TL" },
  { num: 4, code: "EU7UW" },
  { num: 5, code: "E2UR9" },
  { num: 6, code: "EQZ6Y" },
];

let lastStation = null;
let lastBtn = null;

function buildStations() {
  const grid = document.getElementById("stationsGrid");
  STATIONS.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "station-btn";
    btn.innerHTML = `
      <span class="station-num">${s.num}</span>
      <span class="station-label">Station</span>
      <span class="station-code">${s.code}</span>
    `;
    btn.onclick = () => copyCode(s, btn);
    grid.appendChild(btn);
  });
}

function copyCode(station, btn) {
  lastStation = station;

  navigator.clipboard.writeText(station.code).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = station.code;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  });

  if (lastBtn) lastBtn.classList.remove("copied");
  btn.classList.add("copied");
  lastBtn = btn;

  document.getElementById("selectedText").textContent = `Station ${station.num} · ${station.code}`;
  document.getElementById("selectedInfo").classList.add("visible");

  const t = document.getElementById("copyToast");
  t.textContent = `Station ${station.num} – ${station.code} ✓`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function openReev() {
  window.location.href = "shortcuts://run-shortcut?name=Reev";
}

buildStations();
</script>
