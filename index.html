* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* HEADER */
header {
  padding: 52px 0 24px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
}

.header-main {
  font-size: 26px;
  font-weight: 600;
  line-height: 1.1;
  margin-top: 4px;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* SECTIONS */
.section {
  margin-bottom: 20px;
}

.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

/* TIME SETTINGS */
.time-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.time-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  padding: 10px 14px;
  width: 120px;
  outline: none;
  transition: border-color 0.2s;
}

.time-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
}

.notif-btn {
  flex: 1;
  background: linear-gradient(135deg, var(--accent2), #4f46e5);
  border: none;
  border-radius: 10px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 14px 12px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.02em;
}

.notif-btn:active { transform: scale(0.97); opacity: 0.85; }

.notif-status {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.notif-status.granted { color: var(--green); }
.notif-status.denied { color: var(--red); }

/* STATIONS */
.stations-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.station-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.station-btn:active { transform: scale(0.95); }

.station-btn.copied {
  border-color: var(--green);
  background: rgba(0,255,136,0.08);
}

.station-num {
  font-family: 'Space Mono', monospace;
  font-size: 22px;

.station-label {

  text-transform: uppercase;

/* DIVIDER */

/* SETTINGS ROW */
.settings-row {

  justify-content: space-between;

.toggle {
  position: relative;

  height: 24px;
}

.toggle input {

.toggle-slider {

  cursor: pointer;

  color: var(--muted);

}

<script>
// ─── DATEN ───────────────────────────────────────────────────────────────────

const STATIONS = [
  { num: 1, code: "E6583" },
  { num: 2, code: "E5SQZ" },
  { num: 3, code: "EK2TL" },
  { num: 4, code: "EU7UW" },
  { num: 5, code: "E2UR9" },
  { num: 6, code: "EQZ6Y" },
];

const REEV_URL = "reev://";

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  reminderTime: "08:30",
  urlaub: [],         // [{von: "2024-07-15", bis: "2024-07-26"}]
  notifGranted: false,
};

function loadState() {
  try {
    const saved = localStorage.getItem("ladestation_state");
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem("ladestation_state", JSON.stringify(state));
  } catch(e) {}
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
document.getElementById("reminderTime").value = state.reminderTime;
buildStations();
renderUrlaub();
checkNotifStatus();
checkTodaySkip();
checkInstallHint();

// ─── STATIONEN ───────────────────────────────────────────────────────────────
function buildStations() {
  const grid = document.getElementById("stationsGrid");
  grid.innerHTML = "";
  STATIONS.forEach(s => {
    const btn = document.createElement("button");
    btn.className = "station-btn";
    btn.innerHTML = `
      <span class="station-num">${s.num}</span>
      <span class="station-label">Station</span>
      <span class="station-code-preview">${s.code}</span>
    `;
    btn.onclick = () => copyCode(s, btn);
    grid.appendChild(btn);
  });
}

let lastCopied = null;

function copyCode(station, btn) {
  lastStation = station;
  navigator.clipboard.writeText(station.code).then(() => {
    // Visual feedback
    if (lastCopied) lastCopied.classList.remove("copied");
    btn.classList.add("copied");
    lastCopied = btn;
    showToast(`Station ${station.num} – ${station.code} kopiert`);
  }).catch(() => {
    // Fallback für ältere Browser
    const ta = document.createElement("textarea");
    ta.value = station.code;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast(`Station ${station.num} kopiert`);
  });
}

function showToast(msg) {
  const t = document.getElementById("copyToast");
  t.textContent = msg + " ✓";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ─── REEV ────────────────────────────────────────────────────────────────────
function openReev() {
  window.location.href = "https://apps.apple.com/app/id1458494031";
}

// ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
function checkNotifStatus() {
  const el = document.getElementById("notifStatus");
  if (!("Notification" in window)) {
    el.textContent = "⚠ Notifications nicht unterstützt";
    el.className = "notif-status denied";
    return;
  }
  if (Notification.permission === "granted") {
    el.textContent = "⬤  Aktiv – Erinnerung läuft";
    el.className = "notif-status granted";
    state.notifGranted = true;
    scheduleReminder();
  } else if (Notification.permission === "denied") {
    el.textContent = "✗  Blockiert – in iPhone-Einstellungen erlauben";
    el.className = "notif-status denied";
  } else {
    el.textContent = "◯  Noch nicht aktiviert";
    el.className = "notif-status";
  }
}

async function requestAndSchedule() {
  if (!("Notification" in window)) {
    alert("Push-Benachrichtigungen werden auf deinem Gerät nicht unterstützt.\n\nHinweis: Safari auf iOS unterstützt dies nur wenn die Seite als PWA installiert ist (Teilen → Zum Homescreen).");
    return;
  }

  // Zeit speichern
  state.reminderTime = document.getElementById("reminderTime").value;
  saveState();

  const permission = await Notification.requestPermission();
  checkNotifStatus();

  if (permission === "granted") {
    scheduleReminder();
    showToast("Erinnerung gesetzt!");
  } else {
    alert("Benachrichtigungen wurden nicht erlaubt.\n\nEinstellungen → Safari → Mitteilungen → erlauben");
  }
}

// Einfache Erinnerung via setTimeout bis zur nächsten Erinnerungszeit
let reminderTimeout = null;

function scheduleReminder() {
  if (reminderTimeout) clearTimeout(reminderTimeout);
  if (!state.notifGranted && Notification.permission !== "granted") return;

  const now = new Date();
  const [h, m] = state.reminderTime.split(":").map(Number);
  const next = new Date(now);
  next.setHours(h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);

  // Skip weekends & Urlaub
  while (isSkipDay(next)) {
    next.setDate(next.getDate() + 1);
    next.setHours(h, m, 0, 0);
  }

  const ms = next - now;
  reminderTimeout = setTimeout(() => {
    fireNotification();
    scheduleReminder(); // nächste planen
  }, ms);
}

function fireNotification() {
  if (Notification.permission !== "granted") return;
  if (isSkipDay(new Date())) return;

  const n = new Notification("⚡ Auto laden!", {
    body: "Welche Ladestation? Tippen zum Öffnen.",
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>",
    badge: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>",
    vibrate: [200, 100, 200],
    requireInteraction: true,
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// ─── URLAUB ───────────────────────────────────────────────────────────────────
function addUrlaub() {
  const von = document.getElementById("urlaubVon").value;
  const bis = document.getElementById("urlaubBis").value;
  if (!von || !bis) { alert("Von und Bis Datum angeben"); return; }
  if (von > bis) { alert("Von muss vor Bis liegen"); return; }
  state.urlaub.push({ von, bis });
  saveState();
  renderUrlaub();
  checkTodaySkip();
  document.getElementById("urlaubVon").value = "";
  document.getElementById("urlaubBis").value = "";
}

function removeUrlaub(idx) {
  state.urlaub.splice(idx, 1);
  saveState();
  renderUrlaub();
  checkTodaySkip();
}

function renderUrlaub() {
  const list = document.getElementById("urlaubList");
  if (state.urlaub.length === 0) {
    list.innerHTML = `<div style="font-size:13px;color:var(--muted);text-align:center;padding:8px 0">Kein Urlaub eingetragen</div>`;
    return;
  }
  list.innerHTML = state.urlaub.map((u, i) => `
    <div class="urlaub-item">
      <div class="urlaub-dates">${formatDate(u.von)} → ${formatDate(u.bis)}</div>
      <button class="urlaub-del" onclick="removeUrlaub(${i})">✕</button>
    </div>
  `).join("");
}

function formatDate(iso) {
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}

function isSkipDay(date) {
  // Wochenende temporär deaktiviert für Tests
  // const day = date.getDay();
  // if (day === 0 || day === 6) return true;
  const iso = date.toISOString().slice(0, 10);
  return state.urlaub.some(u => iso >= u.von && iso <= u.bis);
}

function checkTodaySkip() {
  const el = document.getElementById("todaySkipInfo");
  el.style.display = isSkipDay(new Date()) ? "flex" : "none";
}

// ─── INSTALL HINT ─────────────────────────────────────────────────────────────
function checkInstallHint() {
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches
    || window.navigator.standalone;
  document.getElementById("installHint").style.display = isStandalone ? "none" : "block";
}

// ─── TIME INPUT ──────────────────────────────────────────────────────────────
document.getElementById("reminderTime").addEventListener("change", function() {
  state.reminderTime = this.value;
  saveState();
  scheduleReminder();
});
</script>
